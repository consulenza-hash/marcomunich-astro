<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    background: #C9BA9B;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 80px 70px 80px;
    position: relative;
  }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1C1A16;
    opacity: 0.5;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 124px;
    line-height: 0.92;
    color: #1C1A16;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .headline .accent {
    color: #1C1A16;
    opacity: 0.38;
  }

  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .cta {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #1C1A16;
    background: rgba(28,26,22,0.12);
    padding: 14px 28px;
    border-radius: 6px;
    letter-spacing: 0.03em;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #1C1A16;
    opacity: 0.4;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="tag">Per Coach, Counselor e Operatori Olistici</div>

  <div class="headline">
    Davanti<br>
    al cliente<br>
    sai cosa<br>
    dire.<br>
    <span class="accent">Davanti allo<br>
    schermo no.</span>
  </div>

  <div class="bottom">
    <div class="cta">147 prompt · €27</div>
    <div class="domain">marcomunich.com</div>
  </div>
</body>
</html>
