<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    background: #EDE4D4;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 80px 70px 80px;
    position: relative;
  }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1C1A16;
    opacity: 0.45;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 108px;
    line-height: 0.93;
    color: #1C1A16;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    line-height: 0.8;
    color: #1C1A16;
    opacity: 0.07;
    position: absolute;
    top: 60px;
    right: 60px;
  }

  .bottom-wrap {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .features {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .feat {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #1C1A16;
    background: rgba(28,26,22,0.1);
    padding: 8px 16px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #EDE4D4;
    background: #1C1A16;
    padding: 14px 28px;
    border-radius: 6px;
    letter-spacing: 0.03em;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #1C1A16;
    opacity: 0.35;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="tag">Per Coach, Counselor e Operatori Olistici</div>
  <div class="number">147</div>

  <div class="headline">
    147 prompt<br>
    costruiti su<br>
    come ragioni<br>
    tu in questo<br>
    lavoro.
  </div>

  <div class="bottom-wrap">
    <div class="features">
      <span class="feat">Contenuti</span>
      <span class="feat">Voce autentica</span>
      <span class="feat">Punto di vista</span>
      <span class="feat">Sessioni</span>
      <span class="feat">Vendita</span>
      <span class="feat">10 Custom GPT</span>
    </div>
    <div class="bottom">
      <div class="cta">Acquista · €27</div>
      <div class="domain">marcomunich.com</div>
    </div>
  </div>
</body>
</html>
