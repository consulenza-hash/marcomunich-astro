<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    background: #2A2620;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px 80px 70px 80px;
    position: relative;
  }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #C9BA9B;
    opacity: 0.5;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 118px;
    line-height: 0.93;
    color: #E8DCCA;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .headline .accent {
    color: #C9BA9B;
    opacity: 0.45;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #C9BA9B;
    opacity: 0.3;
    margin: 24px 0;
  }

  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #C9BA9B;
    line-height: 1.45;
    opacity: 0.75;
    max-width: 680px;
  }

  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .cta {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #2A2620;
    background: #C9BA9B;
    padding: 14px 28px;
    border-radius: 6px;
    letter-spacing: 0.03em;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #C9BA9B;
    opacity: 0.35;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="tag">Prompt Pack · Coach & Operatori Olistici</div>

  <div class="headline">
    L'AI produce<br>
    testo fluente.<br>
    <span class="accent">Il problema<br>
    è che lo fa<br>
    per tutti.</span>
  </div>

  <div class="bottom">
    <div class="cta">147 prompt · €27</div>
    <div class="domain">marcomunich.com</div>
  </div>
</body>
</html>
