name: Daily Rebuild — Publish Scheduled Articles

on:
  schedule:
    # Ogni ora — pubblica articoli schedulati entro ~60 min dalla data prevista
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger deploy workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            console.log('Deploy triggered for scheduled article publish');
