name: Add Custom Domain to CF Pages (one-time)

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Add marcomunich.com to Cloudflare Pages
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          PROJECT="marcomunich-com"

          echo "=== Getting account ID ==="
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
              -H "Authorization: Bearer $CF_TOKEN" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          fi
          echo "Account: $ACCOUNT_ID"

          echo "=== Adding marcomunich.com ==="
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"marcomunich.com"}')
          echo "marcomunich.com: $RESP"

          echo "=== Adding www.marcomunich.com ==="
          RESP2=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"www.marcomunich.com"}')
          echo "www: $RESP2"

          echo "=== Current custom domains ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dom in d.get('result',[]):
              print(f\"  {dom['name']} — status: {dom.get('status','?')}\")
          "
