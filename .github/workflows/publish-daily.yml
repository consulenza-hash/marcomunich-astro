name: Publish Daily — Carousel + Post + Reel

on:
  schedule:
    # 09:00 UTC = 11:00 CEST (Italia) — feriali e festivi
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests instagrapi pillow

      - name: Publish daily (carousel + post + reel)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich.com/contenuti-social
          REELS_BASE_URL: https://marcomunich.com/contenuti-social/video-reels
        run: |
          cd scripts
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python publish_daily.py --dry-run
          else
            python publish_daily.py
          fi
