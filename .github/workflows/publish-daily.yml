name: Publish Daily — Carosello + Post Singolo + Reel

on:
  schedule:
    - cron: '00 8 * * *'   # 08:00 UTC = 10:00 CET / 09:00 invernale
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish daily (carosello + post singolo + reel)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          CAROUSELS_BASE_URL: ${{ secrets.CAROUSELS_BASE_URL }}
          REELS_BASE_URL: https://marcomunich-com.pages.dev/contenuti-social/video-reels
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/publish_daily.py --dry-run
          else
            python scripts/publish_daily.py
          fi

      - name: Commit updated reels-status.json
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .claude/reels-status.json; then
            echo "No changes to reels-status.json"
          else
            git add .claude/reels-status.json
            git commit -m "chore: update reels schedule after publish [skip ci]"
            git push
          fi
