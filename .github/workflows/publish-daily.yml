name: Publish Daily — Carousel only

on:
  schedule:
    # 09:00 UTC = 11:00 CEST (Italia) — feriali e festivi
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false
      force_id:
        description: 'Force publish carousel id N (ignora data)'
        type: string
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests instagrapi pillow

      - name: Publish carousel
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          cd scripts
          ARGS=""
          if [ -n "${{ github.event.inputs.force_id }}" ]; then
            ARGS="--force-id ${{ github.event.inputs.force_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python publish_carousel.py --dry-run $ARGS
          else
            python publish_carousel.py --confirm $ARGS
          fi
