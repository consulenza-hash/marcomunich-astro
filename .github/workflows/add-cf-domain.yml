name: Fix CF Pages - Force Domain Active + DNS via cPanel

on:
  workflow_dispatch:

jobs:
  fix-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Try force-activate CF Pages domain + fix DNS via cPanel
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          PROJECT="marcomunich-com"
          NETSONS_IP="89.40.173.242"
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"

          # Get CF account ID
          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")

          echo "=== 1. Try PATCH to force-activate marcomunich.com ==="
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains/marcomunich.com" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"active"}'

          echo ""
          echo "=== 2. Check domain status ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains/marcomunich.com" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('result',{})
          print('status:', r.get('status'))
          print('verification:', r.get('verification_data',{}).get('status'), '-', r.get('verification_data',{}).get('error_message'))
          "

          echo ""
          echo "=== 3. Try cPanel API DNS change ==="
          # Try different cPanel API auth approaches
          echo "--- Trying UAPI parse_zone ---"
          RESP=$(curl -sk -u "$USER:$PASS" \
            "https://$HOST:$PORT/execute/DNS/parse_zone?zone=marcomunich.com")
          echo "Response length: ${#RESP}"
          echo "First 200 chars: ${RESP:0:200}"

          echo "--- Trying XML API v2 ---"
          RESP2=$(curl -sk -u "$USER:$PASS" \
            "https://$HOST:$PORT/xml-api/cpanel?cpanel_xmlapi_version=2&cpanel_xmlapi_module=ZoneEdit&cpanel_xmlapi_func=fetchzone&domain=marcomunich.com")
          echo "XML Response first 300: ${RESP2:0:300}"

          echo "--- Trying JSON API v2 ---"
          RESP3=$(curl -sk -u "$USER:$PASS" \
            "https://$HOST:$PORT/json-api/cpanel?cpanel_jsonapi_version=2&cpanel_jsonapi_module=ZoneEdit&cpanel_jsonapi_func=fetchzone&domain=marcomunich.com")
          echo "JSON Response first 300: ${RESP3:0:300}"

          echo ""
          echo "=== Done ==="
