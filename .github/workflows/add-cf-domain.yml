name: Fix DNS - Change A record to Netsons

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fix apex A record via cPanel UAPI
        run: |
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          NETSONS_IP="89.40.173.242"
          ZONE="marcomunich.com"
          BASE="https://$HOST:$PORT/execute/DNS"

          # Retry curl up to 3 times
          fetch_zone() {
            for i in 1 2 3; do
              RESP=$(curl -sk --connect-timeout 20 --max-time 45 -u "$USER:$PASS" \
                "$BASE/parse_zone?zone=$ZONE")
              CODE=$?
              if [ $CODE -eq 0 ] && [ -n "$RESP" ]; then
                echo "$RESP"
                return 0
              fi
              echo "Attempt $i failed (curl exit $CODE), retrying..." >&2
              sleep 5
            done
            return 1
          }

          echo "=== Fetching zone (with retry) ==="
          ZONE_JSON=$(fetch_zone)
          if [ $? -ne 0 ]; then echo "ERROR: could not reach cPanel after 3 attempts" && exit 1; fi
          echo "Fetched ${#ZONE_JSON} bytes"

          echo "=== All A records in zone ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if isinstance(r,dict) and r.get('type')=='A':
                  print(f\"  name='{r.get('name','')}' addr={r.get('address','')} line={r.get('line_index','')}\")
          "

          # Find A records pointing to CF Pages IPs (the ones to remove)
          CF_IPS="188.114.96.7,188.114.97.7"
          echo ""
          echo "=== Finding CF Pages A records (to remove) ==="
          INDEXES=$(echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          cf_ips={'188.114.96.7','188.114.97.7'}
          out=[]
          for r in d.get('data',[]):
              if isinstance(r,dict) and r.get('type')=='A' and r.get('address','') in cf_ips:
                  idx=r.get('line_index','')
                  out.append(str(idx))
                  print(f'Found CF record: name={repr(r.get(\"name\"))} addr={r.get(\"address\")} line={idx}', file=sys.stderr)
          print(' '.join(out))
          ")
          echo "CF record indexes: $INDEXES"

          echo "=== Removing CF A records ==="
          for IDX in $INDEXES; do
            RESP=$(curl -sk --connect-timeout 20 --max-time 30 -u "$USER:$PASS" \
              -X POST "$BASE/remove_zone_record" \
              -d "zone=$ZONE&line_index=$IDX")
            echo "  Remove $IDX: $(echo $RESP | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"status\"),d.get(\"messages\"))' 2>/dev/null)"
          done

          echo "=== Adding Netsons A record ==="
          # Add as apex (empty name = zone apex in cPanel UAPI)
          RESP=$(curl -sk --connect-timeout 20 --max-time 30 -u "$USER:$PASS" \
            -X POST "$BASE/add_zone_record" \
            -d "zone=$ZONE&name=$ZONE.&type=A&address=$NETSONS_IP&ttl=300")
          echo "Add: $(echo $RESP | python3 -c 'import sys,json;d=json.load(sys.stdin);print(d.get(\"status\"),d.get(\"messages\"))' 2>/dev/null)"

          echo "=== Final A records ==="
          fetch_zone | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if isinstance(r,dict) and r.get('type')=='A':
                  print(f\"  name='{r.get('name','')}' addr={r.get('address','')} line={r.get('line_index','')}\")
          " 2>/dev/null
          echo "=== Done — DNS propagation ~5 min ==="
