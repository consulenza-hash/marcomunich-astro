name: Fix DNS - Change A record to Netsons

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fix apex A record via cPanel UAPI
        run: |
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          NETSONS_IP="89.40.173.242"
          ZONE="marcomunich.com"
          BASE="https://$HOST:$PORT/execute/DNS"

          fetch_zone() {
            for i in 1 2 3; do
              R=$(curl -sk --connect-timeout 20 --max-time 50 -u "$USER:$PASS" \
                "$BASE/parse_zone?zone=$ZONE")
              [ $? -eq 0 ] && [ -n "$R" ] && echo "$R" && return 0
              sleep 8
            done; return 1
          }

          ZONE_JSON=$(fetch_zone) || { echo "Cannot reach cPanel"; exit 1; }
          echo "Fetched ${#ZONE_JSON} bytes"

          echo "=== First 5 non-comment records (raw) ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          count=0
          for r in d.get('data',[]):
              if isinstance(r,dict) and r.get('type')!='comment':
                  print(json.dumps(r))
                  count+=1
                  if count>=5: break
          "

          echo ""
          echo "=== All records with CF IPs or 89.40 ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if not isinstance(r,dict): continue
              vals=str(r)
              if '188.114' in vals or '89.40' in vals or '188.114.96' in vals:
                  print(json.dumps(r))
          "

          echo ""
          echo "=== Searching by both type/record_type for A records ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          CFIPS={'188.114.96.7','188.114.97.7'}
          out=[]
          for r in d.get('data',[]):
              if not isinstance(r,dict): continue
              rtype=r.get('type') or r.get('record_type','')
              addr=r.get('address','')
              if rtype=='A':
                  name=r.get('name') or r.get('dname','')
                  idx=r.get('line_index') or r.get('line','')
                  print(f'A record: name={repr(name)} addr={addr} idx={idx}')
                  if addr in CFIPS:
                      out.append(str(idx))
          print('CF indexes:', ' '.join(out) if out else 'NONE FOUND')
          "

          echo "=== Done diagnostics ==="
