name: Add CF Custom Domain (fix sito down)

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Add marcomunich.com to CF Pages
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          PROJECT="marcomunich-com"

          echo "=== Getting Account ID from CF API ==="
          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "Account ID found: ${ACCOUNT_ID:0:8}..."

          echo "=== Adding marcomunich.com ==="
          R1=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"marcomunich.com"}')
          echo "$R1" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors'))"

          echo "=== Adding www.marcomunich.com ==="
          R2=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"www.marcomunich.com"}')
          echo "$R2" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if d.get('success') else d.get('errors'))"

          echo "=== Current domains ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dom in d.get('result') or []:
              print(f\"  {dom['name']} — {dom.get('status','?')}\")
          "
