name: Add CF Custom Domain (fix sito down)

on:
  workflow_dispatch:

jobs:
  check-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Check domain status and verification
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          PROJECT="marcomunich-com"
          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")

          echo "=== GET marcomunich.com domain detail ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains/marcomunich.com" \
            -H "Authorization: Bearer $CF_TOKEN"

          echo ""
          echo "=== Pages project info ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('result',{})
          print('name:', r.get('name'))
          print('subdomain:', r.get('subdomain'))
          print('domains:', r.get('domains'))
          "
