name: Add CF Custom Domain (fix sito down)

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Reset & re-add marcomunich.com in CF Pages
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          PROJECT="marcomunich-com"

          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "Account: ${ACCOUNT_ID:0:8}..."

          echo "=== DELETE marcomunich.com ==="
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains/marcomunich.com" \
            -H "Authorization: Bearer $CF_TOKEN"

          sleep 3

          echo "=== RE-ADD marcomunich.com ==="
          R=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"marcomunich.com"}')
          echo "$R" | python3 -c "import sys,json; d=json.load(sys.stdin); print('status:', d.get('result',{}).get('status') if d.get('success') else d.get('errors'))"

          sleep 10

          echo "=== Final domain list ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dom in d.get('result') or []:
              print(f\"  {dom['name']} — {dom.get('status','?')}\")
          "
