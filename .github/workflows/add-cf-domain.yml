name: Fix DNS - Change A record to Netsons

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug zone + fix A records
        run: |
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          NETSONS_IP="89.40.173.242"
          ZONE="marcomunich.com"
          BASE="https://$HOST:$PORT/execute/DNS"
          CURL="curl -sk --connect-timeout 15 --max-time 30 -u $USER:$PASS"

          echo "=== Fetching zone ==="
          ZONE_JSON=$($CURL "$BASE/parse_zone?zone=$ZONE")
          echo "length: ${#ZONE_JSON}"

          echo "=== ALL records (first 20) ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          records=[r for r in d.get('data',[]) if isinstance(r,dict) and r.get('type') not in ('comment',None)]
          for r in records[:20]:
              print(f\"  type={r.get('type')} name='{r.get('name','')}' addr={r.get('address','')} line={r.get('line_index','')}\")
          print(f'Total records: {len(records)}')
          "

          echo "=== Finding A records for apex (all names matching apex) ==="
          INDEXES=$(echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          out=[]
          for r in d.get('data',[]):
              if not isinstance(r,dict): continue
              t=r.get('type','')
              name=r.get('name','').rstrip('.')
              addr=r.get('address','')
              # Match apex: empty name, @, or domain name
              is_apex = name in ('marcomunich.com','@','') or name==''
              if t=='A' and is_apex:
                  idx=r.get('line_index','')
                  out.append(str(idx))
                  print(f'Found apex A: line={idx} name={repr(r.get(\"name\"))} addr={addr}',file=sys.stderr)
          print(' '.join(out))
          ")
          echo "Indexes: $INDEXES"

          echo "=== Removing old A records ==="
          for IDX in $INDEXES; do
            RESP=$($CURL -X POST "$BASE/remove_zone_record" \
              -d "zone=$ZONE&line_index=$IDX")
            echo "  Remove $IDX: $(echo $RESP | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"status\"),d.get(\"messages\"))' 2>/dev/null)"
          done

          echo "=== Adding A @ -> $NETSONS_IP ==="
          RESP=$($CURL -X POST "$BASE/add_zone_record" \
            -d "zone=$ZONE&name=$ZONE.&type=A&address=$NETSONS_IP&ttl=300")
          echo "Add: $(echo $RESP | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"status\"),d.get(\"messages\"))' 2>/dev/null)"

          echo "=== Verify ==="
          $CURL "$BASE/parse_zone?zone=$ZONE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if isinstance(r,dict) and r.get('type')=='A' and 'marcomunich' in r.get('name',''):
                  print(f\"  {r.get('name')} A {r.get('address')} line={r.get('line_index')}\")
          " 2>/dev/null
          echo "=== Done ==="
