name: Fix DNS - Change A record to Netsons

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Change marcomunich.com A record to Netsons via cPanel UAPI
        run: |
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          NETSONS_IP="89.40.173.242"
          ZONE="marcomunich.com"
          CURL="curl -sk --connect-timeout 15 --max-time 30 -u $USER:$PASS"

          echo "=== Fetching DNS zone via UAPI ==="
          ZONE_JSON=$($CURL "https://$HOST:$PORT/execute/DNS/parse_zone?zone=$ZONE")
          STATUS=$?
          echo "curl exit: $STATUS | length: ${#ZONE_JSON}"
          if [ $STATUS -ne 0 ] || [ -z "$ZONE_JSON" ]; then
            echo "ERROR: could not reach cPanel" && exit 1
          fi

          echo "=== Current A/CNAME records for marcomunich.com ==="
          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if isinstance(r, dict) and r.get('type') in ('A','CNAME') and 'marcomunich' in r.get('name',''):
                  print(f\"  line_index={r.get('line_index')} {r.get('name')} {r.get('type')} {r.get('address') or r.get('cname')}\")
          "

          echo "=== Finding A record line indexes for apex ==="
          INDEXES=$(echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          out=[]
          for r in d.get('data',[]):
              if not isinstance(r, dict): continue
              name=r.get('name','').rstrip('.')
              if r.get('type')=='A' and name in ('marcomunich.com','@'):
                  out.append(str(r['line_index']))
                  print(f'Found: line_index={r[\"line_index\"]} addr={r.get(\"address\")}', file=sys.stderr)
          print(' '.join(out))
          ")
          echo "Indexes to remove: $INDEXES"

          echo "=== Removing old A records ==="
          for IDX in $INDEXES; do
            RESP=$($CURL -X POST \
              "https://$HOST:$PORT/execute/DNS/remove_zone_record" \
              -d "zone=$ZONE&line_index=$IDX")
            echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(f'  Removed $IDX: status={d.get(\"status\")} msgs={d.get(\"messages\")}')
            " 2>/dev/null || echo "  Removed $IDX (no parse)"
          done

          echo "=== Adding new A record -> $NETSONS_IP ==="
          RESP=$($CURL -X POST \
            "https://$HOST:$PORT/execute/DNS/add_zone_record" \
            -d "zone=$ZONE&name=$ZONE.&type=A&address=$NETSONS_IP&ttl=300")
          echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(f'Add result: status={d.get(\"status\")} msgs={d.get(\"messages\")}')
          " 2>/dev/null || echo "Add submitted: $RESP"

          echo ""
          echo "=== Final zone check ==="
          $CURL "https://$HOST:$PORT/execute/DNS/parse_zone?zone=$ZONE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('data',[]):
              if isinstance(r, dict) and r.get('type') in ('A','CNAME') and 'marcomunich' in r.get('name',''):
                  print(f\"  {r.get('name')} {r.get('type')} {r.get('address') or r.get('cname')}\")
          " 2>/dev/null
          echo "=== DNS updated. Propagation ~5 min ==="
