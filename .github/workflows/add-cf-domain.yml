name: Fix DNS - Change A record to Netsons

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Change marcomunich.com A record to Netsons via cPanel JSON API v2
        run: |
          HOST="hostingweb21.netsons.net"
          PORT="2083"
          USER="${{ secrets.FTP_USERNAME }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          NETSONS_IP="89.40.173.242"
          ZONE="marcomunich.com"
          BASE="https://$HOST:$PORT/json-api/cpanel?cpanel_jsonapi_version=2&cpanel_jsonapi_module=ZoneEdit"

          echo "=== Fetching DNS zone ==="
          ZONE_JSON=$(curl -sk -u "$USER:$PASS" "$BASE&cpanel_jsonapi_func=fetchzone&domain=$ZONE")

          echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          records = d['cpanelresult']['data'][0]['record']
          for r in records:
              if r.get('type') in ('A','CNAME') and 'marcomunich' in r.get('name',''):
                  print(f\"  line={r.get('line')} {r['name']} {r['type']} {r.get('address') or r.get('cname')}\")
          "

          echo ""
          echo "=== Finding A records for apex ==="
          LINES=$(echo "$ZONE_JSON" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          records = d['cpanelresult']['data'][0]['record']
          out=[]
          for r in records:
              name=r.get('name','').rstrip('.')
              if r.get('type')=='A' and name in ('marcomunich.com','@'):
                  out.append(str(r['line']))
                  print(f'Found A record: line={r[\"line\"]} address={r.get(\"address\")}', file=__import__(\"sys\").stderr)
          print(' '.join(out))
          ")
          echo "Lines to remove: $LINES"

          echo ""
          echo "=== Removing old A records ==="
          for LINE in $LINES; do
            RESP=$(curl -sk -u "$USER:$PASS" \
              "$BASE&cpanel_jsonapi_func=remove_zone_record&domain=$ZONE&line=$LINE")
            echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          ev=d['cpanelresult'].get('event',{})
          print(f'  Removed line $LINE: result={ev.get(\"result\")} reason={ev.get(\"reason\",\"\")}')
            "
          done

          echo ""
          echo "=== Adding new A record -> $NETSONS_IP ==="
          RESP=$(curl -sk -u "$USER:$PASS" \
            "$BASE&cpanel_jsonapi_func=add_zone_record&domain=$ZONE&name=$ZONE.&type=A&address=$NETSONS_IP&ttl=300")
          echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          ev=d['cpanelresult'].get('event',{})
          print(f'Add result: {ev.get(\"result\")} {ev.get(\"reason\",\"\")}')
          "

          echo ""
          echo "=== Verifying new zone ==="
          curl -sk -u "$USER:$PASS" "$BASE&cpanel_jsonapi_func=fetchzone&domain=$ZONE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          records = d['cpanelresult']['data'][0]['record']
          for r in records:
              if r.get('type') in ('A','CNAME') and 'marcomunich' in r.get('name',''):
                  print(f\"  line={r.get('line')} {r['name']} {r['type']} {r.get('address') or r.get('cname')}\")
          "
          echo "=== DNS change submitted. Propagation ~5-10 min ==="
