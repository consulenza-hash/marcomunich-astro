name: Setup Cloudflare DNS (one-time)

on:
  workflow_dispatch:

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Configure DNS via Cloudflare API
        run: |
          CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          DOMAIN="marcomunich.com"

          echo "=== Finding zone ID for $DOMAIN ==="
          ZONE_RESP=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")

          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d['result'] else 'NOT_FOUND')")
          echo "Zone ID: $ZONE_ID"

          if [ "$ZONE_ID" = "NOT_FOUND" ]; then
            echo "ERRORE: dominio marcomunich.com non trovato in Cloudflare DNS."
            echo "Il DNS è gestito da Netsons — serve approccio diverso."
            echo "Risposta CF: $ZONE_RESP"
            exit 1
          fi

          echo "=== Fetching existing DNS records ==="
          RECORDS=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "$RECORDS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
              print(f\"  {r['type']:6} {r['name']:40} → {r['content']}\")
          "

          echo "=== Done. Review records above. ==="
