name: Auto-Publish Articles

on:
  schedule:
    # Runs daily at 08:00 UTC (10:00 CEST)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and publish due articles
        id: publish
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today: $TODAY"

          CHANGED=0

          for file in src/content/articoli/*/index.mdoc; do
            # Check if article is a draft
            if ! grep -q "^bozza: true" "$file"; then
              continue
            fi

            # Get article date
            ARTICLE_DATE=$(grep "^data:" "$file" | head -1 | sed 's/data: //' | tr -d '"' | tr -d "'")

            if [ -z "$ARTICLE_DATE" ]; then
              continue
            fi

            # Compare dates (string comparison works for ISO dates)
            if [[ "$ARTICLE_DATE" <= "$TODAY" ]]; then
              SLUG=$(basename $(dirname "$file"))
              echo "Publishing: $SLUG (date: $ARTICLE_DATE)"

              # Remove bozza: true line
              sed -i '/^bozza: true$/d' "$file"
              CHANGED=$((CHANGED + 1))
            fi
          done

          echo "published=$CHANGED" >> $GITHUB_OUTPUT
          echo "Published $CHANGED article(s)"

      - name: Commit and push published articles
        if: steps.publish.outputs.published != '0'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/content/articoli/
          git commit -m "auto-publish: $(date -u +%Y-%m-%d) — ${{ steps.publish.outputs.published }} article(s) published"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No articles to publish
        if: steps.publish.outputs.published == '0'
        run: echo "No articles due for publication today."
