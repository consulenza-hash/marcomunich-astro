name: Publish Instagram Stories Daily

on:
  # schedule DISATTIVATO — pubblicazione spostata su Missinglettr
  # schedule:
  #   - cron: '30 8 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (simulate without publishing)'
        type: boolean
        default: false
      story_type:
        description: 'Story type: "article" or "product"'
        type: choice
        options:
          - product
          - article
        default: product
      article_slug:
        description: 'Article slug (only if story_type = article)'
        type: string
        default: ''
      product_id:
        description: 'Product id 0-5 (optional, overrides daily rotation)'
        type: string
        default: ''

jobs:
  publish-product-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.story_type == 'product')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish product story (dry-run)
        if: github.event.inputs.dry_run == 'true'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich-com.pages.dev/contenuti-social/immagini-storie
        run: |
          ARGS="--dry-run --product"
          if [ -n "${{ github.event.inputs.product_id }}" ]; then
            ARGS="--dry-run --product-id ${{ github.event.inputs.product_id }}"
          fi
          python scripts/publish_story.py $ARGS

      - name: Publish product story (live)
        if: github.event.inputs.dry_run != 'true'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich-com.pages.dev/contenuti-social/immagini-storie
        run: |
          ARGS="--product"
          if [ -n "${{ github.event.inputs.product_id }}" ]; then
            ARGS="--product-id ${{ github.event.inputs.product_id }}"
          fi
          python scripts/publish_story.py $ARGS

  publish-article-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.story_type == 'article' &&
      github.event.inputs.article_slug != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish article story (dry-run)
        if: github.event.inputs.dry_run == 'true'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich-com.pages.dev/contenuti-social/immagini-storie
        run: python scripts/publish_story.py --dry-run --article "${{ github.event.inputs.article_slug }}"

      - name: Publish article story (live)
        if: github.event.inputs.dry_run != 'true'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich-com.pages.dev/contenuti-social/immagini-storie
        run: python scripts/publish_story.py --article "${{ github.event.inputs.article_slug }}"
