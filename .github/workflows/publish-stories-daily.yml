name: Publish Stories Daily — link sticker

on:
  schedule:
    # 09:30 UTC = 11:30 CEST — dopo publish-daily
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Story mode'
        type: choice
        options:
          - scheduled
          - product
          - dry-run
        default: scheduled

jobs:
  publish-story:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Publish story
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          STORIES_BASE_URL: https://marcomunich.com/contenuti-social
        run: |
          cd scripts
          MODE="${{ github.event.inputs.mode || 'scheduled' }}"
          case "$MODE" in
            dry-run)
              python publish_story.py --dry-run
              ;;
            product)
              python publish_story.py --product --confirm
              ;;
            scheduled|*)
              python publish_story.py --confirm
              ;;
          esac
