name: PHP Hotfix — deploy diretto senza build

on:
  push:
    branches: [main]
    paths:
      - 'public/api/**'
      - 'public/admin/**'
      - 'public/images/**'
      - 'public/contenuti-social/**'

jobs:
  php-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload PHP files via lftp
        run: |
          sudo apt-get install -y lftp -qq
          timeout 120 lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ssl:verify-certificate no;
            set net:timeout 20;
            set net:max-retries 2;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 89.40.173.242;
            mirror --reverse --verbose --parallel=2 public/api/ /public_html/api/;
            mirror --reverse --verbose --parallel=2 public/admin/ /public_html/admin/;
            mirror --reverse --verbose --parallel=4 public/images/ /public_html/images/;
            mirror --reverse --verbose --parallel=6 public/contenuti-social/ /public_html/contenuti-social/;
            quit;
          " || echo "⚠️ lftp completed with warnings"

      - name: Done
        run: echo "✅ PHP files uploaded directly — no Astro build needed"
