name: CF Pages Domain Check and Fix

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - delete-and-readd
          - delete-only

jobs:
  cf-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: marcomunich-com
      DOMAIN: marcomunich.com

    steps:
      - name: Auto-detect Account ID if missing
        run: |
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(curl -s -H "Authorization: Bearer $CF_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts?per_page=5" | \
              python3 -c "import sys,json;d=json.load(sys.stdin);print(d['result'][0]['id'])")
            echo "Detected ACCOUNT_ID=$ACCOUNT_ID"
            echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          fi

      - name: Check current domain status
        run: |
          echo "=== CF Pages domains for $PROJECT ==="
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if not d.get('success'):
              print('ERROR:', d.get('errors'))
              sys.exit(1)
          for dom in d.get('result',[]):
              print(f\"  {dom['name']} → status={dom.get('status')} verification={dom.get('verification_data')}\")
          "

      - name: Delete marcomunich.com from CF Pages
        if: github.event.inputs.action == 'delete-and-readd' || github.event.inputs.action == 'delete-only'
        run: |
          echo "=== Deleting $DOMAIN from CF Pages ==="
          RESP=$(curl -s -X DELETE -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains/$DOMAIN")
          echo "$RESP" | python3 -c "import sys,json;d=json.load(sys.stdin);print('success:', d.get('success'), 'errors:', d.get('errors'))"

      - name: Wait and re-add marcomunich.com
        if: github.event.inputs.action == 'delete-and-readd'
        run: |
          sleep 5
          echo "=== Re-adding $DOMAIN to CF Pages ==="
          RESP=$(curl -s -X POST -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -d "{\"name\":\"$DOMAIN\"}")
          echo "$RESP" | python3 -c "import sys,json;d=json.load(sys.stdin);r=d.get('result',{});print('success:', d.get('success'), 'status:', r.get('status'), 'errors:', d.get('errors'))"

      - name: Final DNS check from runner
        run: |
          echo "=== DNS check ==="
          nslookup $DOMAIN 8.8.8.8 | grep -E 'Address:|Name:'
          echo ""
          echo "=== HTTP check ==="
          curl -sI --max-time 10 http://$DOMAIN/ | head -5 || true
