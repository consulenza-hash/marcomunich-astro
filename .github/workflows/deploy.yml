name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/api/**'
      - 'public/admin/**'
  repository_dispatch:
    types: [wp_content_changed, wp_post_published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Count files
        run: echo "Files to deploy:" && find dist -type f | wc -l

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name marcomunich-com --branch main --commit-dirty=true

      - name: Deploy to Netsons (FTP — HTML + CSS + API)
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          # Create .env for PHP APIs
          printf '%s\n' \
            "STATS_PASSWORD=${{ secrets.STATS_PASSWORD }}" \
            "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
            "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            "STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }}" \
            "SITE_URL=https://marcomunich.com" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "PP_GIST_ID=${{ secrets.PP_GIST_ID }}" \
            "FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}" \
            "FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }}" \
            "GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}" \
            "GSC_SITE_URL=${{ secrets.GSC_SITE_URL }}" \
            "IMAGEN_API_KEY=${{ secrets.IMAGEN_API_KEY }}" \
            > .env-server

          # JSON with double quotes — passed via env var to avoid shell injection
          printf 'GOOGLE_SERVICE_ACCOUNT_JSON=%s\n' "$GOOGLE_SERVICE_ACCOUNT_JSON" >> .env-server

          # Sync HTML + CSS/JS bundles + API to Netsons
          # Exclude large media dirs (handled by php-hotfix.yml) to keep FTP fast
          timeout 300 lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 89.40.173.242;
            put .env-server -o /.env;
            mirror --reverse --verbose --parallel=8 --only-newer \
              --exclude contenuti-social/immagini-caroselli/ \
              --exclude contenuti-social/immagini-post/ \
              --exclude videos/ \
              dist/ /public_html/;
            quit;
          " || echo "⚠️ lftp Netsons sync done (warnings non-fatal)"
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
