name: Deploy to Netsons

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wp_content_changed, wp_post_published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Count files
        run: echo "Files to deploy:" && find dist -type f | wc -l

      - name: Deploy via lftp mirror
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 89.40.173.242;
            mirror --reverse --delete --verbose --parallel=5 dist/ /public_html/;
            quit;
          "
          echo "Deploy complete!"
