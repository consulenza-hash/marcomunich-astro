name: Build & Deploy

# Trigger 1: WordPress pubblica un articolo → invia webhook a GitHub
# Trigger 2: manuale da GitHub Actions tab (utile per test)
on:
  repository_dispatch:
    types: [wp_post_published]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout branch main (sorgente Astro) ──────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      # ── 2. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Installa dipendenze ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Astro ─────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 5. Commit dist/ sul branch deploy ─────────────────────────────────
      - name: Push to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Salva il build in una cartella temporanea
          cp -r dist /tmp/astro-dist

          # Passa al branch deploy
          git checkout deploy

          # Rimuove tutti i file tranne .git e .gitignore
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.git' \
            ! -name '.gitignore' \
            -exec rm -rf {} +

          # Copia il build fresco
          cp -r /tmp/astro-dist/. .

          # Commit e push (solo se ci sono modifiche)
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica — skip commit"
          else
            git commit -m "Auto-deploy: $(date '+%Y-%m-%d %H:%M UTC') — triggered by WordPress"
            git push origin deploy
            echo "Deploy branch aggiornato ✓"
          fi

      # ── 6. Pull sul server via SSH ─────────────────────────────────────────
      - name: Pull on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/public_html
            git reset --hard origin/deploy
            echo "Server aggiornato ✓"
