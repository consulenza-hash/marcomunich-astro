name: Deploy to Netsons

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wp_content_changed, wp_post_published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Prepare deploy folder
        run: |
          # Astro static output is in dist/ (no client/ subfolder)
          echo "Deploy folder ready: $(find dist -type f | wc -l) files"

      - name: Deploy static files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 89.40.173.242
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/_old-api/**
