name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wp_content_changed, wp_post_published, ghost_post_published]
  workflow_dispatch:

jobs:

  # ── Job 1: Astro build (shared artifact) ─────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      api-changed: ${{ steps.check-api.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Check if public/api/** changed
        id: check-api
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^public/api/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_CONTENT_API_KEY: ${{ secrets.GHOST_CONTENT_API_KEY }}

      - name: Strip heavy assets
        run: |
          find dist/contenuti-social/immagini-caroselli -name "*.png" -delete 2>/dev/null || true
          rm -rf dist/contenuti-social/video-reels/ 2>/dev/null || true
          echo "Files to deploy: $(find dist -type f | wc -l) — Size: $(du -sh dist/ | cut -f1)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 2: Cloudflare Pages (statico — sempre, ~30s) ─────────────────────
  deploy-cf:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # CVE-2026-0933 FIX: pin wrangler >= 4.59.1 (command injection via --commit-hash)
          wranglerVersion: '4.59.1'
          command: pages deploy dist --project-name marcomunich-com --branch main --commit-dirty=true

  # ── Job 3: Netsons FTP — static HTML + PHP API ───────────────────────────
  deploy-netsons:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netsons
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          # Write .env for PHP APIs
          printf '%s\n' \
            "STATS_PASSWORD=${{ secrets.STATS_PASSWORD }}" \
            "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
            "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            "STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }}" \
            "SITE_URL=https://marcomunich.com" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "PP_GIST_ID=${{ secrets.PP_GIST_ID }}" \
            "FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}" \
            "FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }}" \
            "GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}" \
            "GSC_SITE_URL=${{ secrets.GSC_SITE_URL }}" \
            "IMAGEN_API_KEY=${{ secrets.IMAGEN_API_KEY }}" \
            "GHOST_URL=${{ secrets.GHOST_URL }}" \
            "GHOST_ADMIN_API_KEY=${{ secrets.GHOST_ADMIN_API_KEY }}" \
            > .env-server
          printf 'GOOGLE_SERVICE_ACCOUNT_JSON=%s\n' "$GOOGLE_SERVICE_ACCOUNT_JSON" >> .env-server

          # Exclude heavy binary assets already on server (immagini, video)
          timeout 300 lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 89.40.173.242;
            put .env-server -o /.env;
            mirror --reverse --verbose --parallel=4 --delete \
              --exclude contenuti-social/immagini-caroselli/ \
              --exclude contenuti-social/video-reels/ \
              --exclude images/ \
              dist/ /public_html/;
            mirror --reverse --verbose --parallel=4 --delete public/api/ /public_html/api/;
            mirror --reverse --verbose --parallel=4 --delete public/admin/ /public_html/admin/;
            quit;
          " || echo "lftp done (warnings non-fatal)"

          # Upload video-reels a Netsons (solo mp4, senza --delete)
          # lftp salta automaticamente i file già presenti (stessa size/mtime)
          # Prima esecuzione ~475MB; successive: STAT check rapido, 0 upload
          echo "Syncing video-reels to Netsons..."
          timeout 600 lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 3;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} 89.40.173.242;
            mirror --reverse --parallel=2 --no-perms \
              --include-glob 'reel-*.mp4' \
              --exclude-glob '*' \
              public/contenuti-social/video-reels/ /public_html/contenuti-social/video-reels/;
            quit;
          " || echo "video sync done (warnings non-fatal)"
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
